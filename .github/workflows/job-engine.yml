name: Job Application Engine

on:
  schedule:
    # Runs daily at 1pm Singapore time (5am UTC)
    - cron: '0 5 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run engine (send applications + follow-ups)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python engine.py

      - name: Check replies + mark no_response
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python orchestrator.py --check

      - name: Commit updated state back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json jobs.csv results.tsv variants.json || true
          if ! git diff --staged --quiet; then
            git pull --rebase origin main
            git commit -m "engine: daily run $(date -u '+%Y-%m-%d')"
            git push
          else
            echo "No state changes to commit"
          fi
